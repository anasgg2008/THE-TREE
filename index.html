<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tree - Cloud Vault</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        body { background-color: #050505; margin: 0; overflow: hidden; font-family: sans-serif; color: white; }
        .node circle { stroke: #ff0000; stroke-width: 2px; filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.9)); cursor: pointer; }
        .link { fill: none; stroke: rgba(255, 0, 0, 0.25); stroke-width: 1.5px; }
        .node text { fill: #ff9999; font-size: 11px; text-shadow: 0 0 5px rgba(255, 0, 0, 0.5); pointer-events: all; cursor: pointer; user-select: none; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; background: rgba(15, 0, 0, 0.95);
            padding: 10px 15px; border-radius: 50px; border: 1px solid #ff0000; z-index: 100;
        }
        button {
            background: #ff0000; border: none; color: white; width: 38px; height: 38px;
            border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        button:hover { background: #fff; color: #ff0000; box-shadow: 0 0 15px #fff; }
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        #lock-screen input {
            background: #110000; border: 1px solid #ff0000; color: white;
            padding: 12px; border-radius: 8px; text-align: center; outline: none; margin-bottom: 15px; width: 260px;
        }
        .loading-text { color: #ff0000; font-size: 12px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div id="lock-screen">
    <h2 style="color: #ff0000; text-shadow: 0 0 15px #ff0000;">🔐 خزنة النيون السحابية</h2>
    <input type="password" id="vault-pass" placeholder="أدخل مفتاح التشفير الخاص بك">
    <button onclick="unlockAndSync()" style="width: 140px; border-radius: 8px;">فتح ومزامنة</button>
    <div id="loading" class="loading-text">جاري جلب البيانات من السحاب...</div>
</div>

<div class="controls">
    <button id="add-btn" style="display:none;">+</button>
    <button id="edit-text-btn" style="display:none;">📝</button>
    <button id="del-btn" style="display:none;">🗑️</button>
    <button id="mode-toggle">✏️</button>
</div>

<script>
    // إعدادات Firebase التي أرسلتها أنت
    const firebaseConfig = {
        apiKey: "AIzaSyBB_15ns50fO29tTACfauOReG--fk0y2oM",
        authDomain: "my-tree-493514.firebaseapp.com",
        databaseURL: "https://my-tree-493514-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "my-tree-493514",
        storageBucket: "my-tree-493514.firebasestorage.app",
        messagingSenderId: "302435563073",
        appId: "1:302435563073:web:f75a59be1b6c0900e038c0"
    };

    // تهيئة Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let treeData = null;
    let encryptionKey = "";
    let isEditMode = false;
    let selectedNode = null;

    // دالة التشفير
    function encrypt(data) {
        return CryptoJS.AES.encrypt(JSON.stringify(data), encryptionKey).toString();
    }

    // دالة فك التشفير
    function decrypt(cipherText) {
        try {
            const bytes = CryptoJS.AES.decrypt(cipherText, encryptionKey);
            return JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
        } catch (e) { return null; }
    }

    // الرفع للسحاب
    function saveToCloud() {
        if (!treeData || !encryptionKey) return;
        const encryptedData = encrypt(treeData);
        db.ref('vault/tree').set(encryptedData);
    }

    // الفتح والمزامنة
    function unlockAndSync() {
        const pass = document.getElementById("vault-pass").value;
        if (!pass) return alert("أدخل كلمة السر!");
        encryptionKey = pass;
        document.getElementById("loading").style.display = "block";

        // جلب البيانات لمرة واحدة عند الدخول
        db.ref('vault/tree').once('value').then((snapshot) => {
            const cloudData = snapshot.val();
            if (cloudData) {
                const decrypted = decrypt(cloudData);
                if (decrypted) {
                    treeData = decrypted;
                    startApp();
                } else {
                    alert("كلمة سر خاطئة أو بيانات تالفة!");
                    document.getElementById("loading").style.display = "none";
                }
            } else {
                // إذا كانت السحابة فارغة، أنشئ شجرة جديدة
                treeData = { name: "المركز الرئيسي", children: [], id: "root" };
                saveToCloud();
                startApp();
            }
        });
    }

    function startApp() {
        document.getElementById("lock-screen").style.display = "none";
        initGraph();
        
        // تفعيل الاستماع اللحظي (إذا تغيرت البيانات في جهاز آخر، تتحدث هنا)
        db.ref('vault/tree').on('value', (snapshot) => {
            const val = snapshot.val();
            if (val) {
                const d = decrypt(val);
                if (d) { treeData = d; update(); }
            }
        });
    }

    // --- كود الرسم (D3.js) ---
    let svg, g, treeLayout;
    function initGraph() {
        svg = d3.select("body").append("svg")
            .attr("width", window.innerWidth).attr("height", window.innerHeight)
            .call(d3.zoom().on("zoom", (e) => g.attr("transform", e.transform)))
            .append("g");
        g = svg.append("g").attr("transform", `translate(100, ${window.innerHeight/2})`);
        treeLayout = d3.tree().nodeSize([80, 250]);
        update();
    }

    function update() {
        const root = d3.hierarchy(treeData, d => d.children);
        treeLayout(root);
        const nodes = root.descendants();
        const links = root.links();

        const link = g.selectAll(".link").data(links, d => d.target.data.id);
        link.enter().append("path").attr("class", "link").merge(link)
            .attr("d", d3.linkHorizontal().x(d => d.y).y(d => d.x));
        link.exit().remove();

        const node = g.selectAll(".node").data(nodes, d => d.data.id);
        const nodeEnter = node.enter().append("g").attr("class", "node")
            .on("click", (event, d) => {
                if (isEditMode) {
                    selectedNode = d;
                    d3.selectAll("circle").style("stroke", "#ff0000");
                    d3.select(event.currentTarget).select("circle").style("stroke", "#fff");
                } else if (d.data.name.startsWith('http')) {
                    window.open(d.data.name, '_blank');
                }
            });

        nodeEnter.append("circle").attr("r", 10);
        nodeEnter.append("text").attr("dy", "1.5em").attr("text-anchor", "middle");

        const nodeUpdate = nodeEnter.merge(node);
        nodeUpdate.attr("transform", d => `translate(${d.y},${d.x})`);
        nodeUpdate.select("text").text(d => d.data.name.startsWith('http') ? "🔗 رابط" : d.data.name);
        node.exit().remove();
    }

    // أزرار التحكم
    document.getElementById("mode-toggle").onclick = () => {
        isEditMode = !isEditMode;
        document.getElementById("mode-toggle").innerText = isEditMode ? "✅" : "✏️";
        ["add-btn", "del-btn", "edit-text-btn"].forEach(id => {
            document.getElementById(id).style.display = isEditMode ? "flex" : "none";
        });
    };

    document.getElementById("add-btn").onclick = () => {
        if (!selectedNode) return alert("اختر غصناً!");
        const name = prompt("الاسم أو الرابط:");
        if (name) {
            if (!selectedNode.data.children) selectedNode.data.children = [];
            selectedNode.data.children.push({ name: name, id: "n" + Date.now() });
            saveToCloud(); update();
        }
    };

    document.getElementById("del-btn").onclick = () => {
        if (!selectedNode || selectedNode.depth === 0) return;
        const parent = selectedNode.parent.data;
        parent.children = parent.children.filter(c => c.id !== selectedNode.data.id);
        saveToCloud(); update();
    };

    document.getElementById("edit-text-btn").onclick = () => {
        if (!selectedNode) return;
        const n = prompt("تعديل:", selectedNode.data.name);
        if (n) { selectedNode.data.name = n; saveToCloud(); update(); }
    };
</script>
</body>
</html>
