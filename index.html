<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tree - Cloud & Fixed</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        body { background-color: #050505; margin: 0; overflow: hidden; font-family: sans-serif; color: white; }
        .node circle { stroke: #ff0000; stroke-width: 2px; filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.9)); cursor: pointer; transition: 0.3s; }
        .link { fill: none; stroke: rgba(255, 0, 0, 0.25); stroke-width: 1.5px; }
        .node text { fill: #ff9999; font-size: 11px; text-shadow: 0 0 5px rgba(255, 0, 0, 0.5); pointer-events: none; user-select: none; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; background: rgba(15, 0, 0, 0.95);
            padding: 10px 15px; border-radius: 50px; border: 1px solid #ff0000; z-index: 100;
        }
        button {
            background: #ff0000; border: none; color: white; width: 42px; height: 42px;
            border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        button:hover { background: #fff; color: #ff0000; box-shadow: 0 0 15px #fff; }
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        #lock-screen input {
            background: #110000; border: 1px solid #ff0000; color: white;
            padding: 12px; border-radius: 8px; text-align: center; outline: none; margin-bottom: 15px; width: 260px;
        }
        .selected circle { stroke: #fff !important; stroke-width: 4px; filter: drop-shadow(0 0 15px #fff); }
        .has-children { fill: #ff0000; }
        .collapsed { fill: #000 !important; }
    </style>
</head>
<body>

<div id="lock-screen">
    <h2 style="color: #ff0000; text-shadow: 0 0 15px #ff0000;">🔐 خزنة النيون المطورة</h2>
    <input type="password" id="vault-pass" placeholder="كلمة سر التشفير">
    <button onclick="unlockAndSync()" style="width: 140px; border-radius: 8px;">دخول</button>
</div>

<div class="controls">
    <button id="add-btn" style="display:none;" title="إضافة فرع">+</button>
    <button id="edit-text-btn" style="display:none;" title="تعديل">📝</button>
    <button id="del-btn" style="display:none;" title="حذف">🗑️</button>
    <button id="mode-toggle">✏️</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBB_15ns50fO29tTACfauOReG--fk0y2oM",
        authDomain: "my-tree-493514.firebaseapp.com",
        databaseURL: "https://my-tree-493514-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "my-tree-493514",
        storageBucket: "my-tree-493514.firebasestorage.app",
        messagingSenderId: "302435563073",
        appId: "1:302435563073:web:f75a59be1b6c0900e038c0"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let treeData = null;
    let encryptionKey = "";
    let isEditMode = false;
    let selectedNodeId = null; 

    function encrypt(data) { return CryptoJS.AES.encrypt(JSON.stringify(data), encryptionKey).toString(); }
    function decrypt(cipherText) {
        try {
            const bytes = CryptoJS.AES.decrypt(cipherText, encryptionKey);
            return JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
        } catch (e) { return null; }
    }

    function saveToCloud() {
        if (!treeData || !encryptionKey) return;
        db.ref('vault/tree').set(encrypt(treeData));
    }

    function unlockAndSync() {
        const pass = document.getElementById("vault-pass").value;
        if (!pass) return alert("أدخل كلمة السر!");
        encryptionKey = pass;

        db.ref('vault/tree').once('value').then((snapshot) => {
            const cloudData = snapshot.val();
            if (cloudData) {
                const decrypted = decrypt(cloudData);
                if (decrypted) { treeData = decrypted; startApp(); }
                else alert("كلمة سر خاطئة!");
            } else {
                treeData = { name: "المركز", children: [], id: "root" };
                saveToCloud(); startApp();
            }
        });
    }

    function startApp() {
        document.getElementById("lock-screen").style.display = "none";
        initGraph();
        db.ref('vault/tree').on('value', (snapshot) => {
            const d = decrypt(snapshot.val());
            if (d) { treeData = d; update(); }
        });
    }

    let svg, g, treeLayout;
    function initGraph() {
        svg = d3.select("body").append("svg")
            .attr("width", window.innerWidth).attr("height", window.innerHeight)
            .call(d3.zoom().scaleExtent([0.1, 3]).on("zoom", (e) => g.attr("transform", e.transform)))
            .append("g");
        g = svg.append("g").attr("transform", `translate(100, ${window.innerHeight/2})`);
        treeLayout = d3.tree().nodeSize([60, 200]);
        update();
    }

    function update() {
        // حساب الشجرة مع دعم الطي (toggle)
        const root = d3.hierarchy(treeData, d => d.children);
        treeLayout(root);
        const nodes = root.descendants();
        const links = root.links();

        const link = g.selectAll(".link").data(links, d => d.target.data.id);
        link.enter().append("path").attr("class", "link").merge(link)
            .transition().duration(300)
            .attr("d", d3.linkHorizontal().x(d => d.y).y(d => d.x));
        link.exit().remove();

        const node = g.selectAll(".node").data(nodes, d => d.data.id);
        const nodeEnter = node.enter().append("g").attr("class", "node")
            .on("click", (event, d) => {
                if (isEditMode) {
                    selectedNodeId = d.data.id; // حفظ المعرف ليبقى مختاراً
                    update(); 
                } else {
                    // وضع الرؤية: فتح/إغلاق الأغصان أو فتح الروابط
                    if (d.data.name.startsWith('http')) {
                        window.open(d.data.name, '_blank');
                    } else if (d.data.children || d.data._children) {
                        if (d.data.children) {
                            d.data._children = d.data.children;
                            d.data.children = null;
                        } else {
                            d.data.children = d.data._children;
                            d.data._children = null;
                        }
                        update();
                    }
                }
            });

        nodeEnter.append("circle").attr("r", 10);
        nodeEnter.append("text").attr("dy", "0.31em").attr("x", 15).attr("text-anchor", "start");

        const nodeUpdate = nodeEnter.merge(node);
        nodeUpdate.transition().duration(300).attr("transform", d => `translate(${d.y},${d.x})`);
        
        // تمييز النقطة المختارة في وضع التعديل
        nodeUpdate.classed("selected", d => d.data.id === selectedNodeId);
        
        nodeUpdate.select("circle")
            .style("fill", d => d.data._children ? "#000" : "#ff0000");

        nodeUpdate.select("text")
            .text(d => d.data.name.startsWith('http') ? "🔗 رابط" : d.data.name);

        node.exit().remove();
    }

    // أزرار التحكم
    document.getElementById("mode-toggle").onclick = () => {
        isEditMode = !isEditMode;
        document.getElementById("mode-toggle").innerText = isEditMode ? "✅" : "✏️";
        ["add-btn", "del-btn", "edit-text-btn"].forEach(id => {
            document.getElementById(id).style.display = isEditMode ? "flex" : "none";
        });
        if (!isEditMode) selectedNodeId = null;
        update();
    };

    document.getElementById("add-btn").onclick = () => {
        if (!selectedNodeId) return alert("اختر نقطة أولاً!");
        const name = prompt("الاسم أو الرابط:");
        if (name) {
            // البحث عن العقدة في شجرة البيانات الأصلية
            const findAndAdd = (data) => {
                if (data.id === selectedNodeId) {
                    if (!data.children) data.children = [];
                    data.children.push({ name: name, id: "n" + Date.now(), children: [] });
                    return true;
                }
                if (data.children) {
                    for (let child of data.children) if (findAndAdd(child)) return true;
                }
                if (data._children) { // للبحث حتى في الفروع المطوية
                    for (let child of data._children) if (findAndAdd(child)) return true;
                }
                return false;
            };
            findAndAdd(treeData);
            saveToCloud();
            update(); // تحديث فوري دون فقدان الاختيار
        }
    };

    document.getElementById("del-btn").onclick = () => {
        if (!selectedNodeId || selectedNodeId === "root") return;
        if (confirm("حذف هذا الفرع؟")) {
            const removeNode = (parent) => {
                let list = parent.children || parent._children;
                if (list) {
                    const idx = list.findIndex(c => c.id === selectedNodeId);
                    if (idx > -1) { list.splice(idx, 1); return true; }
                    for (let c of list) if (removeNode(c)) return true;
                }
                return false;
            };
            removeNode(treeData);
            selectedNodeId = null;
            saveToCloud(); update();
        }
    };

    document.getElementById("edit-text-btn").onclick = () => {
        if (!selectedNodeId) return;
        const newName = prompt("تعديل:");
        if (newName) {
            const findAndEdit = (data) => {
                if (data.id === selectedNodeId) { data.name = newName; return true; }
                let list = data.children || data._children;
                if (list) for (let c of list) if (findAndEdit(c)) return true;
                return false;
            };
            findAndEdit(treeData);
            saveToCloud(); update();
        }
    };
</script>
</body>
</html>
